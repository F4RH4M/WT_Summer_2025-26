<!DOCTYPE html>
<head>  
    <title>Internship Confirmation</title>
</head>
<body>  
    <h1>Internship Confirmation</h1>
    <p>Please fill in your details below:</p>
    <form> 
        <label>student Name:</label><br>
        <input type="text" name="studentName" required><br><br>

        <label>Email Address:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Prefered Internship type:</label><br>
        <input type="radio" name="internshipType" value="onsite"> On-site<br>
        <input type="radio" name="internshipType" value="remote"> Remote<br><br>

        <label>Internship Duration:</label><br>
            <select> name="duration">
                <option value="6weeks">6 Weeks</option>
                <option value="3months">3 Months</option>
            </select><br><br>

          <label>Skills of interest:</label><br>
            <input type="checkbox" name="skills" value="webDev"> Web Development<br>
            <input type="checkbox" name="skills" value="dataanalyst"> Data Analyst<br>
            <input type="checkbox" name="skills" value="mobileapps"> Mobile apps<br><br>

            <input type="submit" value="Submit">

          
    </form>
    
    
</body>
